<div class="pk-page">

  <div class="pk-top">
    <div class="pk-secure">🔒 תשלום מאובטח</div>
    <img src="https://digital.porsimkanaf.com/logo.png" alt="פורשים כנף" />
  </div>

  <p class="pk-course-title">קורס פיננסים לצעירים — פורשים כנף</p>

  <div class="pk-order-line">
    <span class="pk-order-name" data-bind="text: labels.Summary">סה"כ לתשלום:</span>
    <span class="pk-order-price" data-bind="text: summaryTotalSign"></span>
  </div>

  <div class="pk-total-bar">
    <div class="pk-total-label">סה״כ לתשלום</div>
    <div class="pk-total-amount" data-bind="text: summaryTotalSign"></div>
  </div>

  <div class="pk-methods">
    <div class="pk-method-tab pk-active" onclick="pkSwitch('card')">
      <div class="pk-icon"><svg width="26" height="18" viewBox="0 0 28 20" fill="none"><rect x="0.5" y="0.5" width="27" height="19" rx="3.5" stroke="rgba(255,255,255,0.3)"/><rect x="0" y="4" width="28" height="4" fill="rgba(255,255,255,0.15)"/><rect x="4" y="12" width="8" height="2" rx="1" fill="rgba(255,255,255,0.2)"/></svg></div>
      <span class="pk-name">כרטיס אשראי</span>
    </div>
    <div class="pk-method-tab" onclick="pkSwitch('apple')" data-bind="if: IsApplePayActive">
      <div class="pk-icon"><svg width="18" height="22" viewBox="0 0 814 1000" fill="rgba(255,255,255,0.7)"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105.6-57.8-155.5-127.4c-58.2-81-105.6-207.6-105.6-328.3 0-193.1 125.7-295.5 249.3-295.5 65.7 0 120.5 43.1 161.8 43.1 39.4 0 100.8-45.7 175.4-45.7 28.4 0 130.3 2.6 197.7 99.8zm-234.4-184c31.3-37 53.3-88.5 53.3-140 0-7.1-.6-14.3-1.9-20.1-50.8 1.9-110.5 33.8-146.7 76.1-25.8 29-52.7 80.4-52.7 132.9 0 7.8.6 15.6 1.3 18.2 2.6.6 6.4 1.3 10.2 1.3 45.7 0 103.3-30.4 136.5-68.4z"/></svg></div>
      <span class="pk-name">Apple Pay</span>
    </div>
    <div class="pk-method-tab" onclick="pkSwitch('google')">
      <div class="pk-icon"><svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg></div>
      <span class="pk-name">Google Pay</span>
    </div>
  </div>

  <!-- Credit Card Panel -->
  <div class="pk-panel pk-active" id="pk-panel-card">
    <div class="pk-field" data-bind="hide:cardNumber.hide, css:cardNumber.CssValid">
      <label data-bind="text:cardNumber.label">מספר כרטיס</label>
      <input type="text" data-bind="value:cardNumber.value, disable:cardNumber.disabled, visible:IsMobile==false || IsToken, event: { keyup: checkCreditCardBrand }, class: CardBrandClass" placeholder="0000 0000 0000 0000" dir="ltr" id="txtCardNumber" />
      <input type="number" data-bind="value:cardNumber.value, disable:cardNumber.disabled, visible:IsMobile==true && !IsToken, event: { keyup: checkCreditCardBrand }, class: CardBrandClass" placeholder="0000 0000 0000 0000" dir="ltr" id="txtCardNumber-number" />
    </div>

    <div class="pk-row-3">
      <div class="pk-field">
        <label data-bind="text:lblExpiration">חודש</label>
        <select id="validityMonth" data-bind="value: expirationMonth.value, disable: expirationMonth.disabled">
          <option value="1">01</option><option value="2">02</option><option value="3">03</option><option value="4">04</option><option value="5">05</option><option value="6">06</option><option value="7">07</option><option value="8">08</option><option value="9">09</option><option value="10">10</option><option value="11">11</option><option value="12">12</option>
        </select>
      </div>
      <div class="pk-field">
        <label>שנה</label>
        <select id="validityYear" data-bind="options: expirationYear.selectValues, value: expirationYear.value, disable: expirationYear.disabled"></select>
      </div>
      <div class="pk-field" data-bind="hide:cvv.hide, css:cvv.CssValid">
        <label data-bind="text:cvv.label">CVV</label>
        <input maxlength="4" data-bind="value:cvv.value" placeholder="123" dir="ltr" id="txtCvv" />
      </div>
    </div>

    <div class="pk-field" data-bind="hide:cardOwnerName.hide, css:cardOwnerName.CssValid">
      <label data-bind="text:cardOwnerName.label">שם בעל הכרטיס</label>
      <input type="text" maxlength="50" data-bind="value:cardOwnerName.value" placeholder="ישראל ישראלי" id="txtCardOwnerName" />
    </div>

    <div class="pk-field" data-bind="hide:cardOwnerID.hide, css:cardOwnerID.CssValid">
      <label data-bind="text:cardOwnerID.label">תעודת זהות בעל הכרטיס</label>
      <input type="text" maxlength="20" data-bind="value:cardOwnerID.value" placeholder="000000000" dir="ltr" id="txtTZ" />
    </div>

    <div class="pk-field" data-bind="hide:cardOwnerPhone.hide, css:cardOwnerPhone.CssValid">
      <label data-bind="text:cardOwnerPhone.label">טלפון</label>
      <input type="tel" maxlength="20" data-bind="value:cardOwnerPhone.value" placeholder="050-0000000" dir="ltr" id="txtCardOwnerPhone" />
    </div>

    <div class="pk-field" data-bind="hide:cardOwnerEmail.hide, css:cardOwnerEmail.CssValid">
      <label data-bind="text:cardOwnerEmail.label">אימייל</label>
      <input type="email" maxlength="150" data-bind="value:cardOwnerEmail.value" placeholder="email@example.com" dir="ltr" id="txtCardOwnerEmail" />
    </div>

    <div class="pk-field" data-bind="hide:numberOfPayments.hide, css:numberOfPayments.CssValid">
      <label data-bind="text:numberOfPayments.label">מספר תשלומים</label>
      <select data-bind="options: numberOfPayments.selectValues, value: numberOfPayments.value" id="numberOfPaymentsselect"></select>
    </div>

    <input type="button" value="תשלום באמצעות כרטיס אשראי" class="pk-submit-btn" role="button" data-bind="value: buttonText, click: sendData, hide: hideCreditCardInputs, enable: !loadMode()" />
  </div>

  <!-- Apple Pay Panel -->
  <div class="pk-panel" id="pk-panel-apple">
    <div class="ApplePayDiv" data-bind="if: IsApplePayActive">
      <div id="apple-pay-button-start" class="pk-wallet-btn pk-apple" data-bind="attr: { lang: ApplePay.language }, click: ApplePay.startApplePay, visible: ApplePay.applePayInstance.flagsComputed._PaymentBtn">
        <svg width="18" height="22" viewBox="0 0 814 1000" fill="#1a1a1a"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105.6-57.8-155.5-127.4c-58.2-81-105.6-207.6-105.6-328.3 0-193.1 125.7-295.5 249.3-295.5 65.7 0 120.5 43.1 161.8 43.1 39.4 0 100.8-45.7 175.4-45.7 28.4 0 130.3 2.6 197.7 99.8zm-234.4-184c31.3-37 53.3-88.5 53.3-140 0-7.1-.6-14.3-1.9-20.1-50.8 1.9-110.5 33.8-146.7 76.1-25.8 29-52.7 80.4-52.7 132.9 0 7.8.6 15.6 1.3 18.2 2.6.6 6.4 1.3 10.2 1.3 45.7 0 103.3-30.4 136.5-68.4z"/></svg>
        תשלום באמצעות Apple Pay
      </div>
    </div>
  </div>

  <!-- Google Pay Panel -->
  <div class="pk-panel" id="pk-panel-google">
    <div class="GooglePayDiv" id="GooglePayDiv"></div>
  </div>

  <!-- Errors -->
  <div class="errorDiv" data-bind="visible: error.hasMessages()">
    <div class="errorDivIn">
      <ul>
        <!-- ko template: { foreach: error.messages } -->
        <li><span class="message" data-bind="text: message"></span></li>
        <!-- /ko -->
      </ul>
    </div>
  </div>

  <div class="pk-security">
    <span>🔒 SSL</span>
    <span>🔐 256-bit</span>
    <span>✓ PCI DSS</span>
  </div>

  <div class="pk-foot">
    התשלום מתבצע באמצעות חברת קארדקום — סליקת אשראי לעסקים
  </div>

</div>

<script>
function pkSwitch(m){
  document.querySelectorAll('.pk-method-tab').forEach(function(t){t.classList.remove('pk-active')});
  document.querySelectorAll('.pk-panel').forEach(function(p){p.classList.remove('pk-active')});
  if(event&&event.currentTarget)event.currentTarget.classList.add('pk-active');
  var el=document.getElementById('pk-panel-'+m);
  if(el)el.classList.add('pk-active');
  var errDiv=document.querySelector('.errorDiv');
  if(errDiv)errDiv.style.display='none';
}

var cardEl = document.getElementById('txtCardNumber');
if(cardEl){
  cardEl.addEventListener('input', function(e){
    var v = e.target.value.replace(/\s/g,'').replace(/\D/g,'');
    if(v.length > 16) v = v.slice(0,16);
    e.target.value = v.replace(/(.{4})/g,'$1 ').trim();
  });
}
</script>
