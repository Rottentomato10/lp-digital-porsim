<div class="page">

  <div class="top">
    <img src="/logo.png" alt="פורשים כנף" data-bind="attr: { src: images.companyLogo }" />
    <div class="secure">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      תשלום מאובטח
    </div>
  </div>

  <p class="course-title">קורס פיננסים לצעירים — פורשים כנף</p>

  <div class="order-line">
    <div class="order-item">
      <span class="order-name" data-bind="text: labels.Summary">סה"כ לתשלום:</span>
    </div>
    <span class="order-price" data-bind="text: summaryTotalSign"></span>
  </div>

  <div class="total-bar">
    <div class="label">סה״כ לתשלום</div>
    <div class="amount" data-bind="text: summaryTotalSign"></div>
  </div>

  <div class="methods">
    <div class="method-tab active" onclick="switchTab('card')">
      <div class="icon">
        <svg width="26" height="18" viewBox="0 0 28 20" fill="none"><rect x="0.5" y="0.5" width="27" height="19" rx="3.5" stroke="rgba(255,255,255,0.3)"/><rect x="0" y="4" width="28" height="4" fill="rgba(255,255,255,0.15)"/><rect x="4" y="12" width="8" height="2" rx="1" fill="rgba(255,255,255,0.2)"/></svg>
      </div>
      <span class="name">כרטיס אשראי</span>
    </div>
    <div class="method-tab" onclick="switchTab('apple')" data-bind="if: IsApplePayActive">
      <div class="icon">
        <svg width="18" height="22" viewBox="0 0 814 1000" fill="rgba(255,255,255,0.7)"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105.6-57.8-155.5-127.4c-58.2-81-105.6-207.6-105.6-328.3 0-193.1 125.7-295.5 249.3-295.5 65.7 0 120.5 43.1 161.8 43.1 39.4 0 100.8-45.7 175.4-45.7 28.4 0 130.3 2.6 197.7 99.8zm-234.4-184c31.3-37 53.3-88.5 53.3-140 0-7.1-.6-14.3-1.9-20.1-50.8 1.9-110.5 33.8-146.7 76.1-25.8 29-52.7 80.4-52.7 132.9 0 7.8.6 15.6 1.3 18.2 2.6.6 6.4 1.3 10.2 1.3 45.7 0 103.3-30.4 136.5-68.4z"/></svg>
      </div>
      <span class="name">Apple Pay</span>
    </div>
    <div class="method-tab" onclick="switchTab('google')">
      <div class="icon">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      </div>
      <span class="name">Google Pay</span>
    </div>
    <div class="method-tab" onclick="switchTab('bit')" data-bind="ifnot: hideCardcomBitBtn">
      <div class="icon">
        <svg width="28" height="16" viewBox="0 0 60 30" fill="none"><rect width="60" height="30" rx="6" fill="#36D8D1"/><text x="30" y="21" text-anchor="middle" fill="white" font-size="16" font-weight="900" font-family="Arial">bit</text></svg>
      </div>
      <span class="name">Bit</span>
    </div>
  </div>

  <div class="panel active" id="panel-card">
    <div class="formRow cardRow" data-bind="hide:cardNumber.hide, css:cardNumber.CssValid">
      <div class="form-group">
        <label data-bind="text:cardNumber.label">מספר כרטיס</label>
        <input type="text" data-bind="value:cardNumber.value, disable:cardNumber.disabled" placeholder="0000 0000 0000 0000" dir="ltr" id="txtCardNumber" />
      </div>
    </div>

    <div class="row-3">
      <div class="form-group">
        <label data-bind="text: lblExpiration">חודש</label>
        <select id="validityMonth" data-bind="value: expirationMonth.value, disable: expirationMonth.disabled">
          <option value="">חודש</option>
          <option value="1">01</option><option value="2">02</option><option value="3">03</option><option value="4">04</option><option value="5">05</option><option value="6">06</option><option value="7">07</option><option value="8">08</option><option value="9">09</option><option value="10">10</option><option value="11">11</option><option value="12">12</option>
        </select>
      </div>
      <div class="form-group">
        <label>שנה</label>
        <select id="validityYear" data-bind="options: expirationYear.selectValues, value: expirationYear.value, disable: expirationYear.disabled"></select>
      </div>
      <div class="form-group" data-bind="hide:cvv.hide, css:cvv.CssValid">
        <label data-bind="text:cvv.label">CVV</label>
        <input maxlength="4" data-bind="value:cvv.value" placeholder="123" dir="ltr" id="txtCvv" />
      </div>
    </div>

    <div class="formRow cardRow" data-bind="hide:cardOwnerName.hide, css:cardOwnerName.CssValid">
      <div class="form-group">
        <label data-bind="text:cardOwnerName.label">שם בעל הכרטיס</label>
        <input type="text" maxlength="50" data-bind="value:cardOwnerName.value" placeholder="ישראל ישראלי" id="txtCardOwnerName" />
      </div>
    </div>

    <div class="formRow cardRow" data-bind="hide:cardOwnerID.hide, css:cardOwnerID.CssValid">
      <div class="form-group">
        <label data-bind="text:cardOwnerID.label">תעודת זהות בעל הכרטיס</label>
        <input type="text" maxlength="20" data-bind="value:cardOwnerID.value" placeholder="000000000" dir="ltr" id="txtTZ" />
      </div>
    </div>

    <div class="formRow cardRow" data-bind="hide:cardOwnerPhone.hide, css:cardOwnerPhone.CssValid">
      <div class="form-group">
        <label data-bind="text:cardOwnerPhone.label">טלפון</label>
        <input type="tel" maxlength="20" data-bind="value:cardOwnerPhone.value" placeholder="050-0000000" dir="ltr" id="txtCardOwnerPhone" />
      </div>
    </div>

    <div class="formRow cardRow" data-bind="hide:cardOwnerEmail.hide, css:cardOwnerEmail.CssValid">
      <div class="form-group">
        <label data-bind="text:cardOwnerEmail.label">אימייל</label>
        <input type="email" class="directionLTR" maxlength="150" data-bind="value:cardOwnerEmail.value" placeholder="email@example.com" dir="ltr" id="txtCardOwnerEmail" />
      </div>
    </div>

    <div class="formRow cardRow" data-bind="hide:numberOfPayments.hide, css:numberOfPayments.CssValid">
      <div class="form-group">
        <label data-bind="text:numberOfPayments.label">מספר תשלומים</label>
        <select data-bind="options: numberOfPayments.selectValues, value: numberOfPayments.value" id="numberOfPaymentsselect"></select>
      </div>
    </div>

    <div class="submitDiv">
      <input type="button" value="תשלום באמצעות כרטיס אשראי" class="submit-btn" role="button" data-bind="value: buttonText, click: sendData, hide: hideCreditCardInputs, enable: !loadMode()" />
    </div>
  </div>

  <div class="panel" id="panel-apple">
    <div class="ApplePayDiv" data-bind="if: IsApplePayActive">
      <div id="apple-pay-button-start" class="wallet-btn apple" data-bind="attr: { lang : ApplePay.language }, click: ApplePay.startApplePay, visible: ApplePay.applePayInstance.flagsComputed._PaymentBtn">
        <svg width="18" height="22" viewBox="0 0 814 1000" fill="#1a1a1a"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105.6-57.8-155.5-127.4c-58.2-81-105.6-207.6-105.6-328.3 0-193.1 125.7-295.5 249.3-295.5 65.7 0 120.5 43.1 161.8 43.1 39.4 0 100.8-45.7 175.4-45.7 28.4 0 130.3 2.6 197.7 99.8zm-234.4-184c31.3-37 53.3-88.5 53.3-140 0-7.1-.6-14.3-1.9-20.1-50.8 1.9-110.5 33.8-146.7 76.1-25.8 29-52.7 80.4-52.7 132.9 0 7.8.6 15.6 1.3 18.2 2.6.6 6.4 1.3 10.2 1.3 45.7 0 103.3-30.4 136.5-68.4z"/></svg>
        תשלום באמצעות Apple Pay
      </div>
    </div>
  </div>

  <div class="panel" id="panel-google">
    <div class="GooglePayDiv" id="GooglePayDiv"></div>
  </div>

  <div class="panel" id="panel-bit">
    <div id="CardcomBitDiv" data-bind="ifnot: hideCardcomBitBtn">
      <button id="bit-payment-button" type="button" class="wallet-btn bit" data-bind="click: sendData_CardcomBit">
        תשלום באמצעות Bit
      </button>
    </div>
  </div>

  <div class="errorDiv" data-bind="visible: error.hasMessages()" style="background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.25);border-radius:10px;color:#fca5a5;padding:10px;margin-top:10px;">
    <ul style="list-style:none;padding:0;">
      <!-- ko template: { foreach: error.messages } -->
      <li><span data-bind="text: message"></span></li>
      <!-- /ko -->
    </ul>
  </div>

  <div class="security">
    <span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      SSL
    </span>
    <span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      256-bit
    </span>
    <span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
      PCI DSS
    </span>
  </div>

  <div class="foot">
    התשלום מתבצע באמצעות חברת קארדקום — סליקת אשראי לעסקים
  </div>

</div>

<script>
function switchTab(method) {
  document.querySelectorAll('.method-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  if (event && event.currentTarget) event.currentTarget.classList.add('active');
  var el = document.getElementById('panel-' + method);
  if (el) el.classList.add('active');
}
</script>
